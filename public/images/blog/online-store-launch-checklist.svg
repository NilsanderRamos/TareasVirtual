<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Checklist de lanzamiento ecommerce</title>
  <desc id="desc">Lista visual para revisar catalogo, pagos, envios y confianza antes de lanzar una tienda online.</desc>
  <rect width="1200" height="900" fill="#1d4ed8"/>
  <rect x="92" y="88" width="1016" height="724" rx="40" fill="#eff6ff"/>
  <text x="150" y="168" fill="#1d4ed8" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Checklist de lanzamiento ecommerce</text>
  <g fill="#ffffff" stroke="#bfdbfe" stroke-width="4">
    <rect x="150" y="236" width="900" height="88" rx="20"/>
    <rect x="150" y="348" width="900" height="88" rx="20"/>
    <rect x="150" y="460" width="900" height="88" rx="20"/>
    <rect x="150" y="572" width="900" height="88" rx="20"/>
  </g>
  <g fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">
    <text x="206" y="291">Catalogo claro y fichas utiles</text>
    <text x="206" y="403">Checkout probado y pagos activos</text>
    <text x="206" y="515">Envios y devoluciones bien explicados</text>
    <text x="206" y="627">Contacto, confianza y rutina operativa</text>
  </g>
  <g fill="#2563eb">
    <circle cx="176" cy="282" r="12"/>
    <circle cx="176" cy="394" r="12"/>
    <circle cx="176" cy="506" r="12"/>
    <circle cx="176" cy="618" r="12"/>
  </g>
</svg>