  </g>
  <text x="220" y="332" fill="#1d4ed8" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Q1</text>
  <text x="450" y="332" fill="#15803d" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Q2</text>
  <text x="680" y="332" fill="#a16207" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Q3</text>
  <text x="905" y="332" fill="#b91c1c" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Q4</text>
  <rect x="170" y="470" width="860" height="220" rx="28" fill="#e2e8f0"/>
  <text x="226" y="580" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Reservar durante el ano siempre cuesta menos que improvisar en abril.</text>
</svg>