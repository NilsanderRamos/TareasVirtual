<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Calendario fiscal para freelancers</title>
  <desc id="desc">Calendario visual con fechas trimestrales y cierre anual para taxes.</desc>
  <rect width="1200" height="900" fill="#0f766e"/>
  <rect x="110" y="100" width="980" height="700" rx="40" fill="#f8fafc"/>
  <text x="170" y="180" fill="#0f766e" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Calendario fiscal de referencia</text>
  <g>
    <rect x="170" y="250" width="200" height="150" rx="24" fill="#dbeafe"/>
    <rect x="400" y="250" width="200" height="150" rx="24" fill="#dcfce7"/>
    <rect x="630" y="250" width="200" height="150" rx="24" fill="#fef3c7"/>
