<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Marco financiero de referencia</title>
  <desc id="desc">Diagrama visual para flujo de ingresos, gastos y reservas de impuestos.</desc>
  <rect width="1200" height="900" fill="#0f172a"/>
  <rect x="120" y="110" width="960" height="680" rx="36" fill="#f8fafc"/>
  <text x="176" y="188" fill="#0f766e" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">Marco de orden financiero</text>
  <rect x="176" y="260" width="214" height="148" rx="24" fill="#dbeafe"/>
  <rect x="492" y="260" width="214" height="148" rx="24" fill="#dcfce7"/>
  <rect x="808" y="260" width="214" height="148" rx="24" fill="#fef3c7"/>
  <text x="220" y="336" fill="#1d4ed8" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Ingreso bruto</text>
  <text x="548" y="336" fill="#15803d" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Gastos reales</text>
  <text x="850" y="336" fill="#a16207" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Reserva fiscal</text>
  <rect x="258" y="462" width="584" height="164" rx="28" fill="#e2e8f0"/>
  <text x="330" y="542" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">El neto util aparece despues del control</text>
  <text x="278" y="708" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="26">Separar dinero a tiempo evita decisiones tomadas con una cifra inflada.</text>
</svg>