<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Framework de bloques de estudio</title>
  <desc id="desc">Diagrama de prioridad, bloque y repaso para estudio semanal.</desc>
  <rect width="1200" height="900" fill="#f59e0b"/>
  <rect x="120" y="112" width="960" height="676" rx="38" fill="#fffbeb"/>
  <text x="180" y="192" fill="#b45309" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Framework de bloques</text>
  <rect x="180" y="270" width="240" height="170" rx="24" fill="#fde68a"/>
  <rect x="480" y="270" width="240" height="170" rx="24" fill="#fef3c7"/>
  <rect x="780" y="270" width="240" height="170" rx="24" fill="#ffffff"/>
  <text x="234" y="360" fill="#92400e" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Prioridad</text>
  <text x="548" y="360" fill="#92400e" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Bloque</text>
  <text x="852" y="360" fill="#92400e" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Repaso</text>
  <rect x="180" y="500" width="840" height="170" rx="28" fill="#fff7ed"/>
  <text x="252" y="592" fill="#7c2d12" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Un sistema simple funciona mejor que una semana llena de promesas imposibles.</text>
</svg>