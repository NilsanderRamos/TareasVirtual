<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Guia IA para tareas</title>
  <desc id="desc">Portada editorial sobre uso responsable de IA para estudiar y organizar tareas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect x="86" y="82" width="1028" height="736" rx="40" fill="#f8fafc" opacity="0.97"/>
  <text x="146" y="166" fill="#0f766e" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">TareasVirtual / IA</text>
  <text x="146" y="244" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700">Guia practica de IA</text>
  <text x="146" y="304" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700">para hacer tareas mejor</text>
  <text x="146" y="368" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="28">Prompting, revision humana y flujo de trabajo real</text>
  <rect x="146" y="434" width="908" height="288" rx="30" fill="#e2e8f0"/>
  <circle cx="286" cy="576" r="92" fill="#dbeafe"/>
  <circle cx="598" cy="576" r="92" fill="#dcfce7"/>
  <circle cx="910" cy="576" r="92" fill="#fef3c7"/>
  <text x="234" y="584" fill="#1d4ed8" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Prompt</text>
  <text x="542" y="584" fill="#15803d" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Borrador</text>
  <text x="848" y="584" fill="#a16207" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Revision</text>
  <text x="146" y="786" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="26">La IA acelera procesos; el criterio humano define la calidad final.</text>
