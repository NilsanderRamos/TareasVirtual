<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Cinco tecnicas para resumir mejor</title>
  <desc id="desc">Portada editorial con notas, tarjetas y estructura de resumen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect x="82" y="82" width="1036" height="736" rx="40" fill="#f8fafc" opacity="0.97"/>
  <text x="142" y="166" fill="#1d4ed8" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">TareasVirtual / Aprendizaje</text>
  <text x="142" y="244" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700">5 tecnicas para</text>
  <text x="142" y="304" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700">resumir mejor</text>
  <text x="142" y="368" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="28">Destilar ideas, jerarquizar y recordar mas</text>
  <rect x="142" y="430" width="916" height="292" rx="30" fill="#ffffff"/>
  <rect x="194" y="474" width="264" height="204" rx="24" fill="#dbeafe"/>
  <rect x="488" y="474" width="264" height="204" rx="24" fill="#dcfce7"/>
  <rect x="782" y="474" width="224" height="204" rx="24" fill="#fef3c7"/>
  <text x="226" y="528" fill="#1d4ed8" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Metodo Cornell</text>
  <text x="520" y="528" fill="#15803d" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Mapa de ideas</text>
  <text x="814" y="528" fill="#a16207" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Checklist final</text>
  <text x="142" y="786" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="26">Un buen resumen no recorta; reorganiza y aclara.</text>
</svg>